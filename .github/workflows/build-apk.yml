name: Build Oxygen APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo checkout karo
        uses: actions/checkout@v4

      - name: Java 17 setup karo
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle ko executable banao
        run: chmod +x ./gradlew

      - name: Debug APK build karo
        run: ./gradlew assembleDebug --stacktrace

      - name: APK ko upload karo (Artifacts mein milega)
        uses: actions/upload-artifact@v4
        with:
          name: OxygenAssistant-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
